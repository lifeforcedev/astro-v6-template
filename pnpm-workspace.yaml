packages:
  - 'apps/*'
  - 'shared'

onlyBuiltDependencies:
  - '@casoon/astro-post-audit'
  - esbuild

catalog:
  # Astro v6 (stable)
  astro: ^6.0.4
  '@astrojs/check': ^0.9.7
  '@astrojs/cloudflare': ^13.1.1
  '@astrojs/mdx': ^5.0.0
  '@astrojs/svelte': ^8.0.0
  '@casoon/astro-post-audit': ^0.2.6
  '@casoon/astro-speed-measure': ^0.2.0

  # Tailwind v4
  tailwindcss: ^4.2.1
  '@tailwindcss/typography': ^0.5.16
  '@tailwindcss/vite': ^4.2.1

  # Svelte 5
  svelte: ^5.53.11
  '@sveltejs/vite-plugin-svelte': ^6.2.1
  lucide-svelte: ^0.575.0

  # Core
  tsx: ^4.21.0
  typescript: ^5.9.3
  zod: ^4.2.1
  clsx: ^2.1.1
  tailwind-merge: ^3.3.1
  sharp: ^0.34.5

  # Deployment
  wrangler: ^4.72.0

  # Formatting & Linting (Biome only - no more ESLint/Prettier hybrid)
  '@biomejs/biome': ^2.4.6
  husky: ^9.1.7
  lint-staged: ^16.3.3

  # Fonts (reduced set)
  '@fontsource/inter': ^5.2.8
  '@fontsource/lora': ^5.2.8
  '@fontsource/fira-code': ^5.2.7
