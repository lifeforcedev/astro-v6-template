packages:
  - "apps/*"
  - "shared"

onlyBuiltDependencies:
  - "@casoon/astro-post-audit"
  - esbuild
  - sharp
  - workerd

catalog:
  # Astro v6 (stable)
  astro: ^6.1.1
  "@astrojs/check": ^0.9.8
  "@astrojs/cloudflare": ^13.1.4
  "@astrojs/mdx": ^5.0.3
  "@astrojs/svelte": ^8.0.4
  "@axe-core/playwright": ^4.11.1
  "@casoon/astro-post-audit": ^0.2.6
  "@casoon/astro-speed-measure": ^0.2.0

  # Tailwind v4
  tailwindcss: ^4.2.2
  "@tailwindcss/typography": ^0.5.19
  "@tailwindcss/vite": ^4.2.2

  # Svelte 5
  svelte: ^5.54.1
  "@sveltejs/vite-plugin-svelte": ^6.2.1
  lucide-svelte: ^0.577.0

  # Core
  tsx: ^4.21.0
  typescript: ^5.9.3
  zod: ^4.3.6
  clsx: ^2.1.1
  tailwind-merge: ^3.5.0
  satori: ^0.26.0
  "@resvg/resvg-js": ^2.6.2
  sharp: ^0.34.5

  # Deployment
  wrangler: ^4.77.0

  # Formatting & Linting (Biome only - no more ESLint/Prettier hybrid)
  "@biomejs/biome": ^2.4.8
  husky: ^9.1.7
  lint-staged: ^16.4.0

  # Fonts (reduced set)
  "@fontsource/inter": ^5.2.8
  "@fontsource/lora": ^5.2.8
  "@fontsource/fira-code": ^5.2.7
